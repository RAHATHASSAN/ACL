<!DOCTYPE html>
<html>
<head>

<!-- CSS -->
 <style>
 .register-section{

padding:70px 20px;

background:#0f172a;

display:flex;

justify-content:center;

}

.register-card{

width:100%;

max-width:700px;

background:rgba(255,255,255,.05);

backdrop-filter:blur(20px);

padding:40px;

border-radius:20px;

border:1px solid rgba(255,255,255,.1);

box-shadow:0 15px 40px rgba(0,0,0,.35);

}

.register-card h2{

text-align:center;

color:#22c55e;

margin-bottom:10px;

}

.register-card p{

text-align:center;

margin-bottom:30px;

color:#cbd5e1;

}

.input-group{

margin-bottom:20px;

}

.input-group label{

display:block;

margin-bottom:8px;

font-weight:600;

}

.input-group input,

.input-group select{

width:100%;

padding:15px;

border:none;

outline:none;

background:#1e293b;

color:#fff;

border-radius:10px;

font-size:15px;

}

.double{

display:grid;

grid-template-columns:1fr 1fr;

gap:20px;

}

.payment-options{

display:flex;

gap:20px;

margin:20px 0;

flex-wrap:wrap;

}

.payment-options label{

background:#1e293b;

padding:12px 20px;

border-radius:50px;

cursor:pointer;

}

.payment-box{

background:#1e293b;

padding:20px;

border-radius:12px;

margin-bottom:20px;

border-left:5px solid #22c55e;

}

.submit-btn{

width:100%;

padding:16px;

border:none;

background:#22c55e;

color:white;

font-size:18px;

font-weight:700;

border-radius:12px;

cursor:pointer;

transition:.3s;

}

.submit-btn:hover{

background:#16a34a;

transform:translateY(-3px);

}

hr{

margin:30px 0;

border-color:#334155;

}

#onlinePayment{

display:none;

}

@media(max-width:768px){

.double{

grid-template-columns:1fr;

}

.register-card{

padding:25px;

}

}
/* NAVBAR */
/* NAVBAR */
nav{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:15px 40px;
    background:rgba(2,6,23,0.9);
    backdrop-filter:blur(10px);
    position:sticky;
    top:0;
    z-index:1000;
    box-shadow:0 4px 10px rgba(0,0,0,0.3);
}

/* LOGO */
.logo{
    display:flex;
    align-items:center;
    gap:10px; /* spacing */
}
.logo{
    text-decoration:none;
}

.logo img{
    width:42px;
    height:42px;
    object-fit:contain;
    display:block;
}

.logo h2{
    color:#22c55e;
    font-size:22px;
    font-weight:600;
    line-height:1; /* 🔥 important */
    margin:0;
    display:flex;
    align-items:center;
}

/* NAV LINKS */
nav ul{
    display:flex;
    list-style:none;
}

nav ul li{
    margin-left:25px;
}

nav ul li a{
    color:white;
    text-decoration:none;
    font-size:15px;
    position:relative;
    transition:0.3s;
}

/* hover underline effect */
nav ul li a::after{
    content:"";
    position:absolute;
    width:0%;
    height:2px;
    bottom:-5px;
    left:0;
    background:#22c55e;
    transition:0.3s;
}

nav ul li a:hover::after{
    width:100%;
}

nav ul li a:hover{
    color:#22c55e;
}
</style>
</head>

<body>

    <!-- NAVBAR -->
<nav>
    <a href="index.html" class="logo">
    <img src="./Assets/acl logo/remove-photos-background-removed.png" alt="ACL Logo">
    <h2>ACL League</h2>
</a>

    <div class="menu-toggle" id="menu-toggle">
        <span></span>
        <span></span>
        <span></span>
    </div>

    <!-- <ul id="nav-links">
       <li><a href="registration.html">Register</a></li> 
    <li><a href="#history">History</a></li>
    <li><a href="#teams">Teams</a></li>
    <li><a href="#players">Players</a></li> 
    <li><a href="#season">Seasons</a></li>
    <li><a href="#gallery">Gallery</a></li>
    <li><a href="#org">Organizers</a></li>
</ul> -->
</nav>
<section class="register-section">

    <div class="register-card">

        <h2>🏏 ACL Player Registration</h2>
        <p>Complete your registration to participate in ACL Season 07.</p>

        <form id="registerForm">

            <div class="input-group">
                <label>Player Name</label>
                <input type="text" required>
            </div>

            <div class="input-group">
                <label>Phone Number</label>
                <input type="tel" required>
            </div>

            <div class="input-group">
                <label>Email Address</label>
                <input type="email" required>
            </div>

            <div class="double">

                <div class="input-group">
                    <label>Jersey Size</label>

                    <select required>

                        <option value="">Select</option>

                        <option>S</option>
                        <option>M</option>
                        <option>L</option>
                        <option>XL</option>
                        <option>XXL</option>

                    </select>

                </div>

                <div class="input-group">

                    <label>Jersey Number</label>

                    <input type="number" min="1" max="999" required>

                </div>

            </div>

            <div class="input-group">

                <label>Player Image</label>

                <input type="file" accept="image/*" required>

            </div>

            <hr>

            <h3>💳 Payment Method</h3>

            <div class="payment-options">

                <label>

                    <input type="radio" name="payment" value="bkash">

                    bKash

                </label>

                <label>

                    <input type="radio" name="payment" value="nagad">

                    Nagad

                </label>

                <label>

                    <input type="radio" name="payment" value="offline">

                    Offline Pay

                </label>

            </div>

            <div id="onlinePayment">

                <div class="payment-box">

                    <h4>Send Registration Fee</h4>

                    <p>
                        <b>bKash:</b> 017XXXXXXXX
                    </p>

                    <p>
                        <b>Nagad:</b> 018XXXXXXXX
                    </p>

                </div>

                <div class="input-group">

                    <label>Payment Number</label>

                    <input type="text" id="payNumber">

                </div>

                <div class="input-group">

                    <label>Transaction ID</label>

                    <input type="text" id="trx">

                </div>

                <div class="input-group">

                    <label>Payment Screenshot</label>

                    <input type="file" id="paymentImage" accept="image/*">

                </div>

            </div>

            <button type="submit" class="submit-btn">

                Register Player

            </button>

        </form>

    </div>

</section>

<!-- JS --><script>

const paymentRadios=document.querySelectorAll("input[name='payment']");

const paymentDiv=document.getElementById("onlinePayment");

const payNumber=document.getElementById("payNumber");

const trx=document.getElementById("trx");

const paymentImage=document.getElementById("paymentImage");

paymentRadios.forEach(radio=>{

radio.addEventListener("change",()=>{

if(radio.value=="bkash" || radio.value=="nagad"){

paymentDiv.style.display="block";

payNumber.required=true;

trx.required=true;

paymentImage.required=true;

}else{

paymentDiv.style.display="none";

payNumber.required=false;

trx.required=false;

paymentImage.required=false;

}

});

});

document.getElementById("registerForm").addEventListener("submit",function(e){

e.preventDefault();

alert("Registration Submitted Successfully ✅");

});

</script>

</body>
</html>
