<!DOCTYPE html>
<html lang="en">

<style>
    .reg-container{
    display:grid;
    grid-template-columns:repeat(4,1fr);
    gap:20px;
    margin-top:30px;
}

.reg-card{
    background:#1e293b;
    padding:15px;
    border-radius:12px;
    text-align:center;
    transition:0.3s;
}

.reg-card:hover{
    transform:translateY(-5px);
    background:#334155;
}

.reg-card img{
    width:90px;
    height:90px;
    border-radius:50%;
    object-fit:cover;
    margin-bottom:10px;
}

.status{
    margin-top:10px;
    font-weight:600;
}

.pending{
    color:orange;
}

.approved{
    color:#22c55e;
}
/* NAVBAR */
/* NAVBAR */
nav{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:15px 40px;
    background:rgba(2,6,23,0.9);
    backdrop-filter:blur(10px);
    position:sticky;
    top:0;
    z-index:1000;
    box-shadow:0 4px 10px rgba(0,0,0,0.3);
}

/* LOGO */
.logo{
    display:flex;
    align-items:center;
    gap:10px; /* spacing */
}
.logo{
    text-decoration:none;
}

.logo img{
    width:42px;
    height:42px;
    object-fit:contain;
    display:block;
}

.logo h2{
    color:#22c55e;
    font-size:22px;
    font-weight:600;
    line-height:1; /* 🔥 important */
    margin:0;
    display:flex;
    align-items:center;
}

/* NAV LINKS */
nav ul{
    display:flex;
    list-style:none;
}

nav ul li{
    margin-left:25px;
}

nav ul li a{
    color:white;
    text-decoration:none;
    font-size:15px;
    position:relative;
    transition:0.3s;
}

/* hover underline effect */
nav ul li a::after{
    content:"";
    position:absolute;
    width:0%;
    height:2px;
    bottom:-5px;
    left:0;
    background:#22c55e;
    transition:0.3s;
}

nav ul li a:hover::after{
    width:100%;
}

nav ul li a:hover{
    color:#22c55e;
}
</style>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registration History</title>
</head>
<body>
        <!-- NAVBAR -->
<nav>
    <a href="index.html" class="logo">
    <img src="./Assets/acl logo/remove-photos-background-removed.png" alt="ACL Logo">
    <h2>ACL League</h2>
</a>

    <div class="menu-toggle" id="menu-toggle">
        <span></span>
        <span></span>
        <span></span>
    </div>

       <li><a href="registration.html">Register</a></li>

    <li><a href="#season">Seasons</a></li>
    <li><a href="#gallery">Gallery</a></li>
    <li><a href="#org">Organizers</a></li>
</ul> -->
</nav>
  <section id="registration">
    <h2>Player Registration</h2>

    <div class="reg-container" id="regContainer">
        <!-- JS or backend data will load here -->
    </div>
</section>
<script>
    const registrations = [
    {
        name: "Rana",
        photo: "./Assets/players/rana.jpg",
        status: "pending"
    },
    {
        name: "Rahat",
        photo: "./Assets/players/rahat.jpg",
        status: "approved"
    },
    {
        name: "Niloy",
        photo: "./Assets/players/niloy.jpg",
        status: "pending"
    }
];

const container = document.getElementById("regContainer");

registrations.forEach(p => {
    const div = document.createElement("div");
    div.classList.add("reg-card");

    div.innerHTML = `
        <img src="${p.photo}">
        <h3>${p.name}</h3>
        <div class="status ${p.status}">
            ${p.status.toUpperCase()}
        </div>
    `;

    container.appendChild(div);
});
</script>
</body>
</html>
